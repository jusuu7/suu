<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间管理计时器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin:0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .timer-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-weight: 500;
        }

        .btn-primary {
            background: #667eea;
        }

        .btn-primary:hover {
            background: #5a6fd8;
        }

        .btn-success {
            background: #48bb78;
        }

        .btn-success:hover {
            background: #3da066;
        }

        .btn-danger {
            background: #f56565;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-secondary {
            background: #718096;
        }

        .btn-secondary:hover {
            background: #5a6495;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing:border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .rating-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .rating-group {
            text-align: center;
        }

        .rating-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 10px;
        }

        .rating-input {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap:wrap;
        }

        .rating-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .rating-btn:hover,
        .rating-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .history-section {
            border-top: 2px solid #e2e8f0;
            padding-top: 30px;
        }

        .history-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-info {
            flex: 1;
            min-width: 200px;
        }

        .history-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .history-meta {
            font-size: 14px;
            color: #718096;
        }

        .history-rating {
            display: flex;
            gap: 15px;
            align-items:center;
        }

        .rating-badge {
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
            background: #e2e8f0;
            color: #555;
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
            }

            .timer-display {
                font-size: 36px;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .rating-section {
                grid-template-columns: 1fr;
                gap:15px;
            }

            .rating-btn {
                width:30px;
                height:30px;
                font-size:14px;
            }

            .history-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        #manualModal > div {
            max-height: 90vh;
            overflow-y: auto;
            box-sizing:border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⏱️ 时间管理与专注记录</h1>
        <p>记录每一段时光，感受生活的意义与快乐</p>
    </div>

    <div class="stats-section" id="statsSection">
        <div class="stat-card">
            <div class="stat-value" id="todayTime">0h</div>
            <div class="stat-label">今日用时</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">今日记录</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgHappy">0</div>
            <div class="stat-label">平均快乐值</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgMeaning">0</div>
            <div class="stat-label">平均意义值</div>
        </div>
    </div>

    <div class="timer-section">
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startTimer()">开始计时</button>
            <button class="btn btn-secondary hidden" id="pauseBtn" onclick="pauseTimer()">暂停</button>
            <button class="btn btn-danger hidden" id="stopBtn" onclick="stopTimer()">停止</button>
            <button class="btn btn-success" onclick="showManualForm()">手动输入</button>
        </div>
        <div id="currentActivity" class="hidden">
            <p style="color: #667eea; font-weight: 500;">正在记录: <span id="activityName"></span></p>
        </div>
    </div>

    <div class="form-section">
        <h3 style="margin-bottom: 20px; color: #333;">快速记录</h3>
        <div class="form-group">
            <label for="activityInput">事项描述</label>
            <input type="text" id="activityInput" placeholder="例如：写代码、看书、运动...">
        </div>
        <div class="form-group">
            <label for="categorySelect">分类标签</label>
            <select id="categorySelect">
                <option value="工作">工作</option>
                <option value="学习">学习</option>
                <option value="娱乐">娱乐</option>
                <option value="情感">情感</option>
                <option value="创作">创作</option>
                <option value="休息">休息</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div class="rating-section">
            <div class="rating-group">
                <div class="rating-label">😊 快乐值 (1-10分)</div>
                <div class="rating-input" id="happyRating">
                    <button class="rating-btn" data-value="1">1</button>
                    <button class="rating-btn" data-value="2">2</button>
                    <button class="rating-btn" data-value="3">3</button>
                    <button class="rating-btn" data-value="4">4</button>
                    <button class="rating-btn" data-value="5">5</button>
                    <button class="rating-btn" data-value="6">6</button>
                    <button class="rating-btn" data-value="7">7</button>
                    <button class="rating-btn" data-value="8">8</button>
                    <button class="rating-btn" data-value="9">9</button>
                    <button class="rating-btn" data-value="10">10</button>
                </div>
            </div>
            <div class="rating-group">
                <div class="rating-label">⭐ 意义值 (1-10分)</div>
                <div class="rating-input" id="meaningRating">
                    <button class="rating-btn" data-value="1">1</button>
                    <button class="rating-btn" data-value="2">2</button>
                    <button class="rating-btn" data-value="3">3</button>
                    <button class="rating-btn" data-value="4">4</button>
                    <button class="rating-btn" data-value="5">5</button>
                    <button class="rating-btn" data-value="6">6</button>
                    <button class="rating-btn" data-value="7">7</button>
                    <button class="rating-btn" data-value="8">8</button>
                    <button class="rating-btn" data-value="9">9</button>
                    <button class="rating-btn" data-value="10">10</button>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="noteInput">备注 (可选)</label>
            <textarea id="noteInput" rows="2" placeholder="添加一些备注信息..."></textarea>
        </div>
    </div>

    <div class="history-section">
        <h3 style="margin-bottom: 20px; color: #333;">📊 历史记录</h3>
        <div id="historyList"></div>
    </div>
</div>

<div id="manualModal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background:rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%;box-sizing:border-box;">
        <h3 style="margin-bottom: 20px;">手动输入时间</h3>
        <div class="form-group">
            <label>开始时间</label>
            <input type="datetime-local" id="manualStart">
        </div>
        <div class="form-group">
            <label>结束时间</label>
            <input type="datetime-local" id="manualEnd">
        </div>
        <div class="form-group">
            <label>事项描述</label>
            <input type="text" id="manualActivity" placeholder="输入事项描述">
        </div>
        <div class="form-group">
            <label>分类标签</label>
            <select id="manualCategory">
                <option value="工作">工作</option>
                <option value="学习">学习</option>
                <option value="娱乐">娱乐</option>
                <option value="情感">情感</option>
                <option value="创作">创作</option>
                <option value="休息">休息</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top:20px;">
            <button class="btn btn-secondary" onclick="closeManualForm()">取消</button>
            <button class="btn btn-primary" onclick="saveManualRecord()">保存</button>
        </div>
    </div>
</div>

<script>
let isRunning = false;
let startTime = null;
let timerInterval = null;
let currentActivity = null;
let happyRating = 0;
let meaningRating = 0;
let records = [];

document.addEventListener('DOMContentLoaded', function() {
    loadRecords();
    updateStats();
    updateHistory();
    setupRatingButtons();

    const now = new Date();
    const startTime = new Date(now.getTime() - 60 * 60 * 1000);
    document.getElementById('manualStart').value = startTime.toISOString().slice(0, 16);
    document.getElementById('manualEnd').value = now.toISOString().slice(0, 16);
});

function setupRatingButtons() {
    const happyButtons = document.querySelectorAll('#happyRating .rating-btn');
    const meaningButtons = document.querySelectorAll('#meaningRating .rating-btn');

    happyButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            happyRating = parseInt(this.dataset.value);
            updateRatingButtons(happyButtons, happyRating);
        });
    });

    meaningButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            meaningRating = parseInt(this.dataset.value);
            updateRatingButtons(meaningButtons, meaningRating);
        });
    });
}

function updateRatingButtons(buttons, rating) {
    buttons.forEach((btn, index) => {
        if (index < rating) btn.classList.add('active');
        else btn.classList.remove('active');
    });
}

function startTimer() {
    const activity = document.getElementById('activityInput').value.trim();
    if (!activity) { alert('请输入事项描述！'); return; }

    isRunning = true;
    startTime = new Date();
    currentActivity = {
        name: activity,
        category: document.getElementById('categorySelect').value,
        note: document.getElementById('noteInput').value,
        happy: happyRating,
        meaning: meaningRating
    };

    document.getElementById('startBtn').classList.add('hidden');
    document.getElementById('pauseBtn').classList.remove('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
    document.getElementById('currentActivity').classList.remove('hidden');
    document.getElementById('activityName').textContent = activity;

    timerInterval = setInterval(updateTimer, 1000);
}

function pauseTimer() {
    if (isRunning) {
        clearInterval(timerInterval);
        isRunning = false;
        document.getElementById('pauseBtn').textContent = '继续';
    } else {
        isRunning = true;
        timerInterval = setInterval(updateTimer, 1000);
        document.getElementById('pauseBtn').textContent = '暂停';
    }
}

function stopTimer() {
    clearInterval(timerInterval);
    isRunning = false;
    const endTime = new Date();

    const record = {
        id: Date.now(),
        activity: currentActivity.name,
        category: currentActivity.category,
        note: currentActivity.note,
        happy: currentActivity.happy,
        meaning: currentActivity.meaning,
        startTime: startTime.toISOString(),
        endTime: endTime.toISOString(),
        duration: endTime - startTime,
        date: new Date().toDateString()
    };

    saveRecord(record);

    document.getElementById('startBtn').classList.remove('hidden');
    document.getElementById('pauseBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.add('hidden');
    document.getElementById('currentActivity').classList.add('hidden');
    document.getElementById('timerDisplay').textContent = '00:00:00';

    document.getElementById('activityInput').value = '';
    document.getElementById('noteInput').value = '';
    happyRating = 0;
    meaningRating = 0;
    updateRatingButtons(document.querySelectorAll('#happyRating .rating-btn'), 0);
    updateRatingButtons(document.querySelectorAll('#meaningRating .rating-btn'), 0);

    currentActivity = null;
    startTime = null;
}

function updateTimer() {
    if (!isRunning || !startTime) return;
    const now = new Date();
    const duration = now - startTime;
    const h = Math.floor(duration / 3600000);
    const m = Math.floor((duration % 3600000) / 60000);
    const s = Math.floor((duration % 60000) / 1000);
    document.getElementById('timerDisplay').textContent = 
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function showManualForm() {
    const modal = document.getElementById('manualModal');
    modal.style.display = 'flex';
    modal.classList.remove('hidden');
}

function closeManualForm() {
    const modal = document.getElementById('manualModal');
    modal.style.display = 'none';
    modal.classList.add('hidden');
}

function saveManualRecord() {
    const start = document.getElementById('manualStart').value;
    const end = document.getElementById('manualEnd').value;
    const activity = document.getElementById('manualActivity').value.trim();

    if (!start || !end || !activity) { alert('请填写完整信息！'); return; }

    const sDate = new Date(start);
    const eDate = new Date(end);

    if (eDate <= sDate) { alert('结束时间必须晚于开始时间！'); return; }

    const record = {
        id: Date.now(),
        activity: activity,
        category: document.getElementById('manualCategory').value,
        note: '',
        happy: 0,
        meaning: 0,
        startTime: sDate.toISOString(),
        endTime: eDate.toISOString(),
        duration: eDate - sDate,
        date: sDate.toDateString()
    };

    saveRecord(record);
    closeManualForm();
    document.getElementById('manualActivity').value = '';
}

function saveRecord(record) {
    records = JSON.parse(localStorage.getItem('timeRecords') || '[]');
    records.push(record);
    localStorage.setItem('timeRecords', JSON.stringify(records));
    updateStats();
    updateHistory();
}

function loadRecords() {
    records = JSON.parse(localStorage.getItem('timeRecords') || '[]');
}

function deleteRecord(id) {
    if (!confirm('确定删除这条记录吗？')) return;
    records = records.filter(r => r.id !== id);
    localStorage.setItem('timeRecords', JSON.stringify(records));
    updateStats();
    updateHistory();
}

function updateStats() {
    const today = new Date().toDateString();
    const todayRecords = records.filter(r => r.date === today);
    const totalTime = todayRecords.reduce((s, r) => s + r.duration, 0);
    const totalHappy = todayRecords.reduce((s, r) => s + r.happy, 0);
    const totalMeaning = todayRecords.reduce((s, r) => s + r.meaning, 0);

    document.getElementById('todayTime').textContent = formatDuration(totalTime);
    document.getElementById('todayCount').textContent = todayRecords.length;
    document.getElementById('avgHappy').textContent = todayRecords.length ? (totalHappy / todayRecords.length).toFixed(1) : 0;
    document.getElementById('avgMeaning').textContent = todayRecords.length ? (totalMeaning / todayRecords.length).toFixed(1) : 0;
}

function formatDuration(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function updateHistory() {
    const list = document.getElementById('historyList');
    const today = new Date().toDateString();
    const todayRecords = records.filter(r => r.date === today).sort((a,b) => b.id - a.id);

    if (todayRecords.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#718096;">暂无今日记录</p>';
        return;
    }

    list.innerHTML = todayRecords.map(r => {
        const s = new Date(r.startTime);
        const e = new Date(r.endTime);
        return `
        <div class="history-item">
            <div class="history-info">
                <div class="history-title">${r.activity}</div>
                <div class="history-meta">${r.category} | ${s.toLocaleTimeString()} - ${e.toLocaleTimeString()} | ${formatDuration(r.duration)}</div>
            </div>
            <div class="history-rating">
                ${r.happy ? `<span class="rating-badge">😊 ${r.happy}分</span>` : ''}
                ${r.meaning ? `<span class="rating-badge">⭐ ${r.meaning}分</span>` : ''}
                <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="deleteRecord(${r.id})">删除</button>
            </div>
        </div>`;
    }).join('');
}
</script>
</body>
</html>
